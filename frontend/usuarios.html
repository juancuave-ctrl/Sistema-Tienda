<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>

    <link rel="stylesheet" href="css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">

    <h1 class="text-center mb-4">
        Gestión de Usuarios
    </h1>

    <div class="card p-4">

        <form id="formUsuario">

            <div class="mb-3">
                <input type="text"
                       class="form-control"
                       id="nombre"
                       placeholder="Nombre"
                       required>
            </div>

            <div class="mb-3">
                <input type="email"
                       class="form-control"
                       id="correo"
                       placeholder="Correo"
                       required>
            </div>

            <div class="mb-3">
                <input type="password"
                       class="form-control"
                       id="password"
                       placeholder="Contraseña"
                       required>
            </div>

            <button class="btn btn-primary w-100">
                Guardar Usuario
            </button>

        </form>

    </div>

    <div class="card mt-4 p-3">

        <h3>Usuarios registrados</h3>

        <table class="table table-striped">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Nombre</th>

                    <th>Correo</th>

                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tablaUsuarios">

            </tbody>

        </table>

    </div>

</div>

<script src="js/usuarios.js"></script>
