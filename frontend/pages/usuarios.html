<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Usuarios - Sistema Tienda
</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" 
rel="stylesheet">


</head>



<body class="bg-light">



<nav class="navbar navbar-dark bg-dark">


<div class="container">


<span class="navbar-brand">

👥 Gestión de Usuarios

</span>




<div>


<span class="text-white me-3">

👤 <span id="nombreUsuario"></span>

</span>



<button 
id="cerrarSesion"
class="btn btn-danger btn-sm">

Salir

</button>


</div>



</div>


</nav>







<div class="container mt-5">





<div class="card shadow">


<div class="card-body">


<h2 class="text-center mb-4">

Registrar Usuario

</h2>





<form id="formUsuario">





<div class="mb-3">


<label class="form-label">

Nombre

</label>



<input

type="text"

id="nombre"

class="form-control"

required>


</div>







<div class="mb-3">


<label class="form-label">

Correo

</label>



<input

type="email"

id="correo"

class="form-control"

required>


</div>







<div class="mb-3">


<label class="form-label">

Contraseña

</label>



<input

type="password"

id="password"

class="form-control"

required>


</div>







<div class="mb-3">


<label class="form-label">

Rol

</label>



<select id="rol" class="form-control">


<option value="Administrador">

Administrador

</option>


<option value="Vendedor">

Vendedor

</option>



</select>


</div>







<button class="btn btn-success w-100">

Guardar Usuario

</button>




</form>


</div>


</div>









<div class="card shadow mt-4">


<div class="card-body">


<h3>

Usuarios registrados

</h3>






<table class="table table-striped">


<thead>


<tr>


<th>ID</th>

<th>Nombre</th>

<th>Correo</th>

<th>Rol</th>

<th>Acciones</th>



</tr>


</thead>





<tbody id="tablaUsuarios">


</tbody>




</table>




</div>


</div>







</div>








<script src="../js/auth.js"></script>

<script src="../js/usuarios.js"></script>



</body>

</html>
