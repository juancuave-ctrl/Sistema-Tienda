<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Entradas de Inventario</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="bg-light">


<div class="container mt-5">


<div class="card shadow">


<div class="card-body">


<h2 class="text-center mb-4">

Entrada de Inventario

</h2>



<form id="formEntrada">



<div class="mb-3">

<label class="form-label">
Producto
</label>


<input
type="text"
id="producto"
class="form-control"
placeholder="Nombre del producto"
required>


</div>





<div class="mb-3">

<label class="form-label">
Cantidad recibida
</label>


<input
type="number"
id="cantidad"
class="form-control"
placeholder="Cantidad"
required>


</div>





<div class="mb-3">

<label class="form-label">
Proveedor
</label>


<input
type="text"
id="proveedor"
class="form-control"
placeholder="Nombre del proveedor"
required>


</div>





<button class="btn btn-success w-100">

Registrar Entrada

</button>



</form>


</div>

</div>





<div class="card shadow mt-4">


<div class="card-body">


<h3>
Historial de Entradas
</h3>



<table class="table table-striped">


<thead>

<tr>

<th>ID</th>
<th>Producto</th>
<th>Cantidad</th>
<th>Proveedor</th>
<th>Fecha</th>

</tr>

</thead>



<tbody id="tablaEntradas">


</tbody>



</table>


</div>


</div>



</div>



<script src="../js/entradas.js"></script>


</body>

</html>
